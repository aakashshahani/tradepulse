<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="TradePulse">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#101b3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1c2b4d" stroke-width="1" opacity="0.6">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- pulse / price line -->
  <polyline fill="none" stroke="url(#accent)" stroke-width="5"
    stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"
    points="70,205 170,205 210,205 240,120 275,255 320,175 360,205 470,205
            520,205 555,90 600,235 650,150 700,205 820,205 870,205 905,140
            945,215 985,205 1130,205"/>

  <!-- last-price dot -->
  <circle cx="1130" cy="205" r="7" fill="#34d399" filter="url(#glow)"/>

  <!-- wordmark -->
  <text x="70" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="86" font-weight="700" fill="#f8fafc" letter-spacing="1">
    Trade<tspan fill="#34d399">Pulse</tspan>
  </text>
  <text x="74" y="192" font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="24" font-weight="400" fill="#93a4c3" letter-spacing="3">
    real-time crypto trade streaming pipeline
  </text>
</svg>
