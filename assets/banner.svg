<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="TradePulse">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f1b38"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>

  <!-- subtle horizontal grid -->
  <g stroke="#1b2a4a" stroke-width="1" opacity="0.55">
    <line x1="60" y1="90"  x2="1150" y2="90"/>
    <line x1="60" y1="150" x2="1150" y2="150"/>
    <line x1="60" y1="210" x2="1150" y2="210"/>
  </g>
  <line x1="680" y1="255" x2="1150" y2="255" stroke="#26385f" stroke-width="2"/>

  <!-- candlesticks (OHLC), the thing this project computes -->
  <g stroke-linecap="butt">
    <!-- up candles: green, down candles: red -->
    <g stroke="#34d399" fill="#34d399">
      <line x1="712"  y1="170" x2="712"  y2="210" stroke-width="2"/>
      <rect x="704"  y="180" width="16" height="25" rx="2"/>
      <line x1="800"  y1="150" x2="800"  y2="200" stroke-width="2"/>
      <rect x="792"  y="160" width="16" height="38" rx="2"/>
      <line x1="888"  y1="128" x2="888"  y2="182" stroke-width="2"/>
      <rect x="880"  y="140" width="16" height="35" rx="2"/>
      <line x1="976"  y1="108" x2="976"  y2="162" stroke-width="2"/>
      <rect x="968"  y="118" width="16" height="40" rx="2"/>
      <line x1="1064" y1="88"  x2="1064" y2="140" stroke-width="2"/>
      <rect x="1056" y="100" width="16" height="35" rx="2"/>
      <line x1="1108" y1="72"  x2="1108" y2="112" stroke-width="2"/>
      <rect x="1100" y="85"  width="16" height="15" rx="2"/>
    </g>
    <g stroke="#f87171" fill="#f87171">
      <line x1="756"  y1="165" x2="756"  y2="205" stroke-width="2"/>
      <rect x="748"  y="180" width="16" height="18" rx="2"/>
      <line x1="844"  y1="150" x2="844"  y2="185" stroke-width="2"/>
      <rect x="836"  y="160" width="16" height="15" rx="2"/>
      <line x1="932"  y1="132" x2="932"  y2="170" stroke-width="2"/>
      <rect x="924"  y="140" width="16" height="18" rx="2"/>
      <line x1="1020" y1="110" x2="1020" y2="145" stroke-width="2"/>
      <rect x="1012" y="118" width="16" height="17" rx="2"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="70" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="74" font-weight="700" letter-spacing="0.5">
    <tspan fill="#f8fafc">Trade</tspan><tspan fill="#34d399">Pulse</tspan>
  </text>
  <text x="73" y="188" font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="19" font-weight="400" fill="#8da0c2" letter-spacing="1">
    real-time crypto trade streaming pipeline
  </text>
</svg>
