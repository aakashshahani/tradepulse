services:
  kafka:
    image: apache/kafka:4.3.1
    container_name: tradepulse-kafka
    restart: unless-stopped
    ports:
      # Host-side (external) clients connect on 29092 -> HOST listener.
      # In-network containers use kafka:9092 (INTERNAL, not published here).
      - "29092:29092"
    environment:
      # --- KRaft: single node acting as both broker and controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Listeners ---
      # Two client listeners so the broker advertises the right address per path:
      #   INTERNAL (9092)  -> advertised as kafka:9092   (other containers)
      #   HOST     (29092) -> advertised as localhost:29092 (host machine)
      # A single listener can't serve both, because the advertised address a
      # client is told to reconnect on must be resolvable from that client.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Single-broker sane defaults ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:18
    container_name: tradepulse-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Postgres 18 uses a version-specific PGDATA (/var/lib/postgresql/18/docker),
      # so mount the parent dir to persist it.
      - postgres_data:/var/lib/postgresql
      # init.sql runs only on first startup (when the data volume is empty).
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot: create trades.raw with 6 partitions before the producer starts,
  # instead of relying on 1-partition auto-creation. Keying by symbol keeps
  # per-symbol ordering regardless of partition count. Idempotent.
  kafka-init:
    image: apache/kafka:4.3.1
    container_name: tradepulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic trades.raw \
          --partitions 6 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --describe --topic trades.raw

  producer:
    build: ./producer
    container_name: tradepulse-producer
    restart: unless-stopped
    depends_on:
      kafka:
        # Wait until the broker passes its healthcheck before connecting.
        condition: service_healthy
      kafka-init:
        # Wait until the topic has been created with its partition count.
        condition: service_completed_successfully
    environment:
      # Internal Docker network hostname, NOT localhost.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-trades.raw}
      COINBASE_WS_URL: ${COINBASE_WS_URL:-wss://ws-feed.exchange.coinbase.com}
      PRODUCT_IDS: ${PRODUCT_IDS:-BTC-USD,ETH-USD,SOL-USD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  spark_job:
    build: ./spark_job
    container_name: tradepulse-spark
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-trades.raw}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CHECKPOINT_DIR: /opt/spark_checkpoints
      ALERT_THRESHOLD_PCT: ${ALERT_THRESHOLD_PCT:-0.3}
    volumes:
      # Persist streaming checkpoints so the job resumes after a restart.
      - spark_checkpoints:/opt/spark_checkpoints

  dashboard:
    build: ./dashboard
    container_name: tradepulse-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRODUCT_IDS: ${PRODUCT_IDS:-BTC-USD,ETH-USD,SOL-USD}
      # Same value the spark_job uses, so the alerts caption shows the real threshold.
      ALERT_THRESHOLD_PCT: ${ALERT_THRESHOLD_PCT:-0.3}
    ports:
      - "8501:8501"

volumes:
  postgres_data:
  spark_checkpoints:
