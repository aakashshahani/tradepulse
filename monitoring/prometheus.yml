global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: producer
    static_configs:
      - targets: ["producer:8000"]

  - job_name: spark
    static_configs:
      - targets: ["spark_job:8001"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
